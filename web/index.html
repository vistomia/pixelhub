<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pixelhub</title>
    <style>
        body {
            cursor: url('./ico.png') !important;
        }

        #screen {
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 1000px;
            height: 1000px;
        }

        #hud {
            position: absolute;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }

        #mouse-preview, #hud, #id {
            pointer-events: none;
        }

        #cursor {
            position: absolute;
            display: block;
            background-color: black;
            width: 15px;
            height: 15px;
            top: -55px;
            left: 10px;
        } 

        button, input {
            height: 3rem;
            pointer-events: all !important;
        }
    </style>
    <script src="https://unpkg.com/@panzoom/panzoom@4.6.1/dist/panzoom.min.js"></script> <!-- biblioteca de pan e zoom-->
    <script src="scripts/services.js"></script>           <!-- funções fetch -->
    <script src="scripts/drawingTools.js"></script>         <!-- implementação das ferramentas -->
    <script src="scripts/canvas.js" defer></script>        <!-- implementação da tela -->
    <script src="scripts/sync.js" defer></script>              <!-- requests de sincronização da tela -->
</head>
<body>
    <div id="hud">
        <button onclick="setPencil()">lápis</button>
        <button onclick="setEraser()">borracha</button>
        <button onclick="setPan()">mover</button>
        <button onclick="setBucket()">balde de tinta</button>
        <button onclick="setDropper()">conta gotas</button>
        <input id="color-1" type="color" value="#000000"></input>
        <input id="color-2" type="color" value="#FFFFFF"></input>
        <div id="cursor"></div>
    </div>
    <div id="screen">
        <canvas id="map"></canvas>
        <canvas id="mouse-preview"></canvas>
    </div>
    </body>
</html>
